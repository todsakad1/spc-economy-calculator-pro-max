<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Economy Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ── TOKENS ─────────────────────────────────────────── */
        :root {
            --bg:         #0d0f14;
            --panel:      #12151d;
            --card:       #181c27;
            --card-hover: #1e2333;
            --border:     #252b3b;
            --border-hi:  #2e3650;
            --text:       #c8d0e4;
            --text-dim:   #5a6480;
            --text-muted: #3a4060;
            --accent:     #4a7fa5;
            --accent-hi:  #5e9bbf;
            --accent-glow: rgba(74, 127, 165, 0.15);

            /* resource colors */
            --energy:    #e2b96a;
            --minerals:  #7eb8d4;
            --alloys:    #c5a97a;
            --food:      #6aaa7e;
            --tech:      #a888cc;
            --unity:     #e08080;
            --trade:     #80c0b0;
            --special:   #8899cc;
            --default:   #8899aa;

            --green:  #5aac78;
            --red:    #c05a5a;
            --orange: #c88040;

            --radius-sm: 4px;
            --radius:    6px;
            --radius-lg: 10px;
            --mono: 'Share Tech Mono', monospace;
            --body: 'Inter', sans-serif;
        }

        /* ── RESET & BASE ───────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.5;
        }
        input, select, button { font-family: var(--body); font-size: 14px; }

        /* ── TOPBAR ─────────────────────────────────────────── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 24px;
            gap: 12px;
        }
        .topbar-title {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--accent-hi);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .topbar-actions { display: flex; gap: 8px; }

        /* ── BUTTONS ────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border: 1px solid var(--border-hi);
            border-radius: var(--radius-sm);
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            white-space: nowrap;
        }
        .btn:hover { background: var(--card-hover); border-color: var(--accent); color: #fff; }
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent-hi);
            color: #fff;
        }
        .btn-primary:hover { background: var(--accent-hi); border-color: #fff; }
        .btn-danger { border-color: #3a2020; color: #c07070; }
        .btn-danger:hover { background: #2a1515; border-color: var(--red); color: var(--red); }
        .btn-sm { padding: 3px 8px; font-size: 12px; }
        .btn-ghost { background: transparent; border-color: transparent; color: var(--text-dim); }
        .btn-ghost:hover { background: var(--card); border-color: var(--border-hi); color: var(--text); }
        .btn-calculate {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            background: var(--accent);
            border: 1px solid var(--accent-hi);
            color: #fff;
            border-radius: var(--radius);
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: background 0.15s, box-shadow 0.15s;
        }
        .btn-calculate:hover {
            background: var(--accent-hi);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* ── INPUTS ─────────────────────────────────────────── */
        input[type="text"], input[type="number"], input[list], select {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 5px 8px;
            outline: none;
            transition: border-color 0.15s;
        }
        input[type="text"]:focus,
        input[type="number"]:focus,
        input[list]:focus,
        select:focus { border-color: var(--accent); }
        input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; width: 14px; height: 14px; }
        input[type="number"] { width: 70px; }
        input[type="text"] { width: 150px; }
        input[list] { width: 190px; }
        select { cursor: pointer; }

        /* ── LAYOUT ─────────────────────────────────────────── */
        .page-body { max-width: 1400px; margin: 0 auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

        .section {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
            background: var(--card);
            gap: 10px;
            flex-wrap: wrap;
        }
        .section-title {
            font-family: var(--mono);
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent-hi);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
        }
        .section-hint {
            font-size: 12px;
            color: var(--text-dim);
            padding: 8px 18px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
        }
        .section-body { padding: 14px 18px; }
        .section-body-scroll { padding: 14px 18px; max-height: 60vh; overflow-y: auto; }
        .section-body-scroll::-webkit-scrollbar { width: 6px; }
        .section-body-scroll::-webkit-scrollbar-track { background: transparent; }
        .section-body-scroll::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

        /* ── GLOBAL MODS ────────────────────────────────────── */
        .group-container { margin-bottom: 6px; }
        .group-header {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--card);
            border: 1px solid var(--border-hi);
            border-radius: var(--radius);
            padding: 8px 12px;
            margin-bottom: 6px;
        }
        .group-toggle {
            cursor: pointer;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--accent);
            width: 16px;
            text-align: center;
            user-select: none;
            flex-shrink: 0;
        }
        .group-name-input {
            font-weight: 600;
            font-size: 13px;
            background: transparent !important;
            border: none !important;
            flex-grow: 1;
            padding: 0 !important;
            margin: 0 !important;
            color: var(--text) !important;
        }
        .group-name-input:focus { border-bottom: 1px solid var(--accent) !important; border-radius: 0 !important; }

        .mod-row {
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 7px 10px;
            margin-bottom: 5px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .mod-row:last-child { margin-bottom: 0; }

        .empty-state {
            color: var(--text-muted);
            font-size: 13px;
            padding: 8px 0;
            font-style: italic;
        }

        /* ── PLANET CARDS ───────────────────────────────────── */
        .planet-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            margin-bottom: 10px;
            overflow: hidden;
            transition: border-color 0.15s;
        }
        .planet-card:hover { border-color: var(--border-hi); }
        .planet-card:last-child { margin-bottom: 0; }

        .planet-card-header {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 14px;
            background: var(--card-hover);
            border-bottom: 1px solid var(--border);
        }
        .planet-name-input {
            font-weight: 600;
            font-size: 14px;
            width: 160px !important;
            background: var(--bg) !important;
        }
        .planet-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 4px 8px;
            font-size: 12px;
            color: var(--text-dim);
        }
        .planet-meta input, .planet-meta select { background: transparent !important; border: none !important; color: var(--text); font-size: 12px; padding: 0; }
        .planet-meta input[type="number"] { width: 42px; }

        .planet-local-mods {
            padding: 10px 14px;
        }
        .local-mods-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-dim);
            font-family: var(--mono);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 7px;
        }

        .checkbox-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 4px 8px;
            font-size: 12px;
            color: var(--text-dim);
            cursor: pointer;
            white-space: nowrap;
            transition: border-color 0.15s, color 0.15s;
        }
        .checkbox-pill:hover { border-color: var(--accent); color: var(--text); }

        .output-label {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 4px 8px;
            font-size: 12px;
            color: var(--text-dim);
        }
        .output-label input { width: 44px !important; font-family: var(--mono); font-size: 12px; background: transparent !important; border: none !important; color: var(--text); padding: 0 !important; }

        /* ── LEDGER ─────────────────────────────────────────── */
        .ledger-section {
            border: 1px solid var(--accent);
            background: var(--panel);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .ledger-section .section-header { background: rgba(74,127,165,0.08); border-color: var(--accent); }

        #output-display {
            padding: 14px 18px;
        }
        .ledger-empty {
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 13px;
            padding: 20px 0;
            text-align: center;
        }

        .ledger-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
        }
        .ledger-resource {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: border-color 0.15s;
        }
        .ledger-resource.net-positive { border-color: rgba(90, 172, 120, 0.4); }
        .ledger-resource.net-negative { border-color: rgba(192, 90, 90, 0.35); }
        .ledger-resource.net-positive:hover { border-color: var(--green); }
        .ledger-resource.net-negative:hover { border-color: var(--red); }

        .res-name {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .res-net {
            font-family: var(--mono);
            font-size: 20px;
            font-weight: 400;
            line-height: 1;
        }
        .res-net.positive { color: var(--green); }
        .res-net.negative { color: var(--red); }
        .res-net.neutral { color: var(--text-dim); }
        .res-details {
            display: flex;
            gap: 10px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 2px;
        }
        .res-gross { color: #5a8a5a; }
        .res-upkeep { color: #8a5a5a; }

        /* Resource accent bar */
        .res-bar {
            height: 2px;
            border-radius: 1px;
            margin-bottom: 6px;
            opacity: 0.6;
        }

        /* ── MISC ───────────────────────────────────────────── */
        .divider { height: 1px; background: var(--border); margin: 10px 0; }

        .indent { margin-left: 28px; }
        .indent-2 { margin-left: 56px; }
    </style>
</head>
<body>

<datalist id="modifier-options"></datalist>

<!-- TOP BAR -->
<header class="topbar">
    <span class="topbar-title">⬡ Empire Economy Calculator</span>
    <div class="topbar-actions">
        <span id="tech-indicator" style="font-family:var(--mono);font-size:11px;color:var(--text-dim);display:none;">
            🔬 <span id="tech-count">0</span> techs active
        </span>
        <a href="techtree.html" class="btn btn-sm" style="text-decoration:none;">⚛ Tech Tree</a>
        <button class="btn btn-sm" onclick="saveData()">💾 Save</button>
        <button class="btn btn-sm" onclick="document.getElementById('file-upload').click()">📂 Load</button>
        <input type="file" id="file-upload" style="display:none" accept=".json" onchange="loadData(event)">
    </div>
</header>

<div class="page-body">

    <!-- GLOBAL MODIFIERS -->
    <div class="section">
        <div class="section-header">
            <span class="section-title">Global Modifiers</span>
            <div style="display:flex;gap:6px;">
                <button class="btn btn-sm" onclick="addGroup(null, 0)">+ Group</button>
                <button class="btn btn-sm" onclick="addGlobalModifier(null)">+ Loose Mod</button>
            </div>
        </div>
        <div class="section-hint">Tech, civics, traditions. Negative values reduce upkeep (e.g. -10).</div>
        <div class="section-body">
            <div id="global-mods-container"></div>
        </div>
    </div>

    <!-- PLANETS -->
    <div class="section">
        <div class="section-header">
            <span class="section-title">Empire Planets</span>
            <button class="btn btn-sm btn-primary" onclick="addPlanet()">+ Add Planet</button>
        </div>
        <div class="section-body-scroll">
            <div id="planet-container"></div>
        </div>
    </div>

    <!-- CALCULATE + LEDGER -->
    <div class="section ledger-section">
        <div class="section-header">
            <span class="section-title">Ledger</span>
        </div>
        <div style="padding: 14px 18px; border-bottom: 1px solid var(--border);">
            <button class="btn-calculate" onclick="calculateEconomy()">▶ Calculate Economy</button>
        </div>
        <div id="output-display">
            <div class="ledger-empty">Configure your empire and hit Calculate.</div>
        </div>
    </div>

</div>

    let appState = { groups: [], globalModifiers: [], planets: [] };

    // Tech tree state — read live from localStorage (written by techtree.html on every toggle)
    function getResearched() {
        try { return JSON.parse(localStorage.getItem('spc_techtree') || '{}'); } catch(e) { return {}; }
    }

    function updateTechIndicator() {
        const researched = getResearched();
        const count = Object.values(researched).filter(Boolean).length;
        const ind = document.getElementById('tech-indicator');
        const cnt = document.getElementById('tech-count');
        if (count > 0) { ind.style.display = ''; cnt.textContent = count; }
        else { ind.style.display = 'none'; }
    }

    // Apply researched tech effects as synthetic modifiers injected into calculation
    // Returns arrays of synthetic planet-scope and turn-scope modifiers
    function getTechModifiers() {
        const planetMods = []; // {type, value, target, scope:'planet'}
        const turnMods = [];   // {type, value, scope:'turn'}

        const RES_MAP = {
            tech:'Tech', food:'Food', minerals:'Minerals', mineral:'Minerals',
            alloys:'Alloys', alloy:'Alloys', money:'Trade', unity:'Unity',
            influence:'Influence', abstract:'Tech', basic:null, trade:'Trade'
        };

        const techResearched = getResearched();
        Object.entries(techResearched).forEach(([id, isRes]) => {
            if (!isRes) return;
            // Find node in TECH_NODES (built at init)
            const node = TECH_NODES[id];
            if (!node || !node.effects) return;

            node.effects.forEach(e => {
                if (e.kind === 'flat_turn') {
                    const res = RES_MAP[e.res] || e.res;
                    turnMods.push({ name: node.name, type: `Flat ${res}`, value: e.val, scope: 'turn' });
                } else if (e.kind === 'pct_turn') {
                    if (e.res === 'basic') {
                        turnMods.push({ name: node.name, type: '% Basic', value: e.val, scope: 'turn' });
                    } else if (e.res === 'alloys' || e.res === 'alloy') {
                        turnMods.push({ name: node.name, type: '% Alloys', value: e.val, scope: 'turn' });
                    } else if (e.res === 'unity') {
                        turnMods.push({ name: node.name, type: '% Unity', value: e.val, scope: 'turn' });
                    } else if (e.res === 'tech') {
                        turnMods.push({ name: node.name, type: '% Tech', value: e.val, scope: 'turn' });
                    } else {
                        const res = RES_MAP[e.res] || e.res;
                        turnMods.push({ name: node.name, type: `% ${res}`, value: e.val, scope: 'turn' });
                    }
                } else if (e.kind === 'flat_planet') {
                    if (e.res === 'basic') {
                        planetMods.push({ name: node.name, type: 'Flat Basic', value: e.val, target: 'all', scope: 'planet' });
                    } else {
                        const res = RES_MAP[e.res] || e.res;
                        planetMods.push({ name: node.name, type: `Flat ${res}`, value: e.val, target: 'all', scope: 'planet' });
                    }
                } else if (e.kind === 'flat_typed_planet') {
                    // Map planet_type to target
                    const PTYPE_TARGET = {
                        agri: 'type_Agri-World (Organic)',
                        mining: 'type_Mining World (Organic)',
                        tech: 'type_Tech-World (Organic)',
                        forge: 'type_Forge World',
                        generator: 'type_Generator World (Organic)',
                        unification: 'type_Unification Center (Organic)',
                        all: 'all'
                    };
                    const target = PTYPE_TARGET[e.planet_type] || 'all';
                    const res = RES_MAP[e.res] || e.res;
                    planetMods.push({ name: node.name, type: `Flat ${res}`, value: e.val, target, scope: 'planet' });
                } else if (e.kind === 'flat_upkeep_planet') {
                    const res = RES_MAP[e.res] || e.res;
                    planetMods.push({ name: node.name, type: `Flat ${res} Upkeep`, value: e.val, target: 'all', scope: 'planet' });
                }
            });
        });

        return { planetMods, turnMods };
    }

    function initDatalist() {
        const datalist = document.getElementById('modifier-options');
        let options = [];
        ['All', 'Basic', 'Abstract', 'Special', 'Strategic'].forEach(cat => {
            options.push(`% ${cat}`); options.push(`Flat ${cat}`);
            options.push(`% ${cat} Upkeep`); options.push(`Flat ${cat} Upkeep`);
        });
        ALL_RESOURCES.forEach(res => {
            let prettyName = res.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            options.push(`% ${prettyName}`); options.push(`Flat ${prettyName}`);
            options.push(`% ${prettyName} Upkeep`); options.push(`Flat ${prettyName} Upkeep`);
        });
        datalist.innerHTML = options.map(opt => `<option value="${opt}"></option>`).join('');
    }

    function saveData() {
        // Combine economy state + tech tree state into one save file
        const combined = Object.assign({}, appState);
        try {
            const tt = localStorage.getItem('spc_techtree');
            if (tt) combined.techtree = JSON.parse(tt);
        } catch(ex) {}
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(combined, null, 2));
        const anchor = document.createElement('a');
        anchor.href = dataStr; anchor.download = "empire_save.json";
        document.body.appendChild(anchor); anchor.click(); anchor.remove();
    }

    function loadData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                let loadedState = JSON.parse(e.target.result);
                if (!loadedState.groups) loadedState.groups = [];
                if (loadedState.globalModifiers) {
                    loadedState.globalModifiers.forEach(m => { if (m.parentId === undefined) m.parentId = null; });
                }
                if (loadedState.planets) {
                    loadedState.planets.forEach(p => {
                        if (p.ignoreGlobalMods === undefined) p.ignoreGlobalMods = false;
                        if (p.finalProdMulti === undefined) p.finalProdMulti = 100;
                    });
                }
                appState = loadedState;
                // Load tech tree state if present — push to localStorage for live sync
                if (loadedState.techtree) {
                    try { localStorage.setItem('spc_techtree', JSON.stringify(loadedState.techtree)); } catch(ex) {}
                    updateTechIndicator();
                }
                renderApp();
            } catch (err) { alert("Error loading configuration."); }
        };
        reader.readAsText(file);
    }

    // --- 3. STATE MUTATORS ---
    function addGroup(parentId, level) {
        let groupName = prompt("Group name:", "New Group");
        if (!groupName) return;
        appState.groups.push({ id: Date.now(), parentId, name: groupName, expanded: true, level });
        renderApp();
    }
    function updateGroup(id, field, value) {
        const g = appState.groups.find(g => g.id === id);
        if (g) g[field] = value;
    }
    function toggleGroup(id) {
        const g = appState.groups.find(g => g.id === id);
        if (g) { g.expanded = !g.expanded; renderApp(); }
    }
    function removeGroup(groupId) {
        let toDelete = [groupId]; let i = 0;
        while (i < toDelete.length) {
            appState.groups.filter(g => g.parentId === toDelete[i]).forEach(g => toDelete.push(g.id));
            i++;
        }
        appState.groups = appState.groups.filter(g => !toDelete.includes(g.id));
        appState.globalModifiers = appState.globalModifiers.filter(m => !toDelete.includes(m.parentId));
        renderApp();
    }
    function addGlobalModifier(parentId) {
        appState.globalModifiers.push({ id: Date.now(), parentId, name: "New Buff", type: "% Basic", value: 0, scope: "planet", target: "all" });
        renderApp();
    }
    function updateGlobalModifier(id, field, value) {
        const m = appState.globalModifiers.find(m => m.id === id);
        if (m) m[field] = value;
        renderApp();
    }
    function removeGlobalModifier(id) {
        appState.globalModifiers = appState.globalModifiers.filter(m => m.id !== id);
        renderApp();
    }
    function addPlanet() {
        const id = Date.now();
        const firstType = Object.keys(PLANET_DATA)[0];
        const firstTier = Object.keys(PLANET_DATA[firstType])[0];
        appState.planets.push({ id, name: "New Planet", type: firstType, tier: firstTier, hab: "80-100", asc: 0, finalProdMulti: 100, ignoreGlobalMods: false, modifiers: [] });
        renderApp();
    }
    function updatePlanet(id, field, value) {
        const p = appState.planets.find(p => p.id === id);
        if (p) {
            p[field] = value;
            if (field === 'type') {
                const validTiers = Object.keys(PLANET_DATA[value]);
                if (!validTiers.includes(p.tier)) p.tier = validTiers[0];
            }
            renderApp();
        }
    }
    function removePlanet(id) { appState.planets = appState.planets.filter(p => p.id !== id); renderApp(); }
    function addLocalModifier(pId) {
        const p = appState.planets.find(p => p.id === pId);
        if (p) { p.modifiers.push({ id: Date.now(), name: "Local Buff", type: "% Basic", value: 0 }); renderApp(); }
    }
    function updateLocalModifier(pId, mId, field, value) {
        const p = appState.planets.find(p => p.id === pId);
        if (p) { const m = p.modifiers.find(m => m.id === mId); if (m) m[field] = value; renderApp(); }
    }
    function removeLocalModifier(pId, mId) {
        const p = appState.planets.find(p => p.id === pId);
        if (p) { p.modifiers = p.modifiers.filter(m => m.id !== mId); renderApp(); }
    }

    // --- 4. RENDERING ---
    function generateTargetOptions(selectedTarget) {
        let opts = `<option value="all" ${selectedTarget === 'all' ? 'selected' : ''}>All Planets</option>`;
        for (let i = 1; i <= 8; i++) opts += `<option value="tier_${i}" ${selectedTarget === `tier_${i}` ? 'selected' : ''}>Tier ${i}+</option>`;
        Object.keys(PLANET_DATA).forEach(type => opts += `<option value="type_${type}" ${selectedTarget === `type_${type}` ? 'selected' : ''}>Type: ${type}</option>`);
        return opts;
    }

    function renderGroupTree(parentId, level) {
        let html = '';
        const indentClass = level === 1 ? 'indent' : (level >= 2 ? 'indent-2' : '');

        appState.groups.filter(g => g.parentId === parentId).forEach(g => {
            html += `
                <div class="group-container ${indentClass}">
                    <div class="group-header">
                        <div class="group-toggle" onclick="toggleGroup(${g.id})">${g.expanded ? '▼' : '▶'}</div>
                        <input class="group-name-input" type="text" value="${g.name}" onchange="updateGroup(${g.id}, 'name', this.value)">
                        ${level < 2 ? `<button class="btn btn-sm" onclick="addGroup(${g.id}, ${level + 1})" style="background:#1e1a2e;border-color:#4a3a6a;color:#c090e0;">+ Sub</button>` : ''}
                        <button class="btn btn-sm" onclick="addGlobalModifier(${g.id})">+ Mod</button>
                        <button class="btn btn-sm btn-danger" onclick="removeGroup(${g.id})">✕</button>
                    </div>
                    <div style="display:${g.expanded ? 'block' : 'none'}">
                        ${renderGroupTree(g.id, level + 1)}
                    </div>
                </div>
            `;
        });

        appState.globalModifiers.filter(m => m.parentId === parentId).forEach(m => {
            html += `
                <div class="mod-row ${indentClass}">
                    <input type="text" value="${m.name}" onchange="updateGlobalModifier(${m.id}, 'name', this.value)" placeholder="Buff name" style="width:130px;">
                    <select onchange="updateGlobalModifier(${m.id}, 'scope', this.value)">
                        <option value="planet" ${m.scope === 'planet' ? 'selected' : ''}>Per Planet</option>

                    <button class="btn btn-sm btn-danger" onclick="removeGlobalModifier(${m.id})">✕</button>
                </div>
            `;
        });

        return html || (parentId === null && appState.groups.length === 0 && appState.globalModifiers.length === 0
            ? '<div class="empty-state">No modifiers added yet.</div>'
            : '');
    }

    // --- 5. ENGINE (BUGS FIXED) ---
    function parseModifier(typeString, value) {
        let str = typeString.toLowerCase().trim();
        let isPct = str.startsWith('%');
        let isFlat = str.startsWith('flat');
        if (!isPct && !isFlat) return [];
        let isUpkeep = str.includes('upkeep');
        let resTargetStr = str.substring(isFlat ? 5 : 2).replace('upkeep', '').trim();
        let resTarget = resTargetStr.replace(/ /g, '_');
        let targets = resTarget === 'all' ? ALL_RESOURCES : (RESOURCE_TYPES[resTarget] || [resTarget]);
        return targets.map(t => ({ res: t, isPct, value, isUpkeep }));
    }

    function calculateEconomy() {
        let gross = {}; let upkeep = {};
        let turnMods = []; let planetMods = [];

        appState.globalModifiers.forEach(m => {
            if (m.scope === 'turn') turnMods.push(m);
            if (m.scope === 'planet') planetMods.push(m);
        });

        // Inject researched tech modifiers
        const techMods = getTechModifiers();
        techMods.planetMods.forEach(m => planetMods.push(m));
        techMods.turnMods.forEach(m => turnMods.push(m));

        appState.planets.forEach(p => {
            const baseData = PLANET_DATA[p.type] && PLANET_DATA[p.type][p.tier];
            if (!baseData) return;

            let activeBuffs = { prodPct: {}, prodFlat: {}, upkPct: {}, upkFlat: {} };
            function applyToAccumulator(modObj) {
                parseModifier(modObj.type, modObj.value).forEach(mod => {
                    if (mod.isUpkeep) {
                        if (mod.isPct) activeBuffs.upkPct[mod.res] = (activeBuffs.upkPct[mod.res] || 0) + mod.value;
                        else activeBuffs.upkFlat[mod.res] = (activeBuffs.upkFlat[mod.res] || 0) + mod.value;
                    } else {
                        if (mod.isPct) activeBuffs.prodPct[mod.res] = (activeBuffs.prodPct[mod.res] || 0) + mod.value;
                        else activeBuffs.prodFlat[mod.res] = (activeBuffs.prodFlat[mod.res] || 0) + mod.value;
                    }
                });
            }

            p.modifiers.forEach(applyToAccumulator);

            if (!p.ignoreGlobalMods) {
                planetMods.forEach(m => {
                    let matches = (m.target === 'all');
                    if (m.target && m.target.startsWith('type_') && p.type === m.target.substring(5)) matches = true;
                    if (m.target && m.target.startsWith('tier_')) {
                        let pTierNum = parseInt((p.tier.match(/\d+/) || [0])[0]);
                        if (pTierNum >= parseInt(m.target.substring(5))) matches = true;
                    }
                    if (matches) applyToAccumulator(m);
                });
            }

            let habPenalty = p.hab === "0-49" ? 0.70 : (p.hab === "50-79" ? 0.30 : 0);
            const ascBonus = p.asc * 0.05;
            const finalMultiplier = (p.finalProdMulti !== undefined ? p.finalProdMulti : 100) / 100;

            let allProdResources = new Set([...Object.keys(baseData.prod || {}), ...Object.keys(activeBuffs.prodFlat)]);
            allProdResources.forEach(res => {
                let baseAmount = (baseData.prod && baseData.prod[res]) || 0;
                // BUG FIX #1 & #2: floor basePlusFlat at 0 to prevent negative production/upkeep exploits
                let basePlusFlat = Math.max(0, baseAmount + (activeBuffs.prodFlat[res] || 0));
                let pctMultiplier = Math.max(0, 1 - habPenalty + ascBonus + ((activeBuffs.prodPct[res] || 0) / 100));
                gross[res] = (gross[res] || 0) + (basePlusFlat * pctMultiplier * finalMultiplier);
            });

            let allUpkResources = new Set([...Object.keys(baseData.upkeep || {}), ...Object.keys(activeBuffs.upkFlat)]);
            allUpkResources.forEach(res => {
                let baseAmount = (baseData.upkeep && baseData.upkeep[res]) || 0;
                // BUG FIX #1: floor upkeep basePlusFlat at 0
                let basePlusFlat = Math.max(0, baseAmount + (activeBuffs.upkFlat[res] || 0));
                let pctMultiplier = Math.max(0, 1 + ((activeBuffs.upkPct[res] || 0) / 100));
                upkeep[res] = (upkeep[res] || 0) + (basePlusFlat * pctMultiplier);
            });
        });

        // BUG FIX #3: turn-scope % mods that target resources with zero base now silently work
        // by initialising the key to 0 before multiplying, so at least they don't error or disappear
        turnMods.forEach(m => {
            parseModifier(m.type, m.value).forEach(mod => {
                if (mod.isUpkeep) {
                    if (mod.isPct) upkeep[mod.res] = (upkeep[mod.res] || 0) * (1 + (mod.value / 100));
                    else upkeep[mod.res] = (upkeep[mod.res] || 0) + mod.value;
                } else {
                    if (mod.isPct) {
                        // If no production exists yet, % mult on 0 still gives 0 — but at least it won't silently discard
                        gross[mod.res] = (gross[mod.res] || 0) * (1 + (mod.value / 100));
                    }
                    else gross[mod.res] = (gross[mod.res] || 0) + mod.value;
                }
            });
        });

        let sortedResources = Array.from(new Set([...Object.keys(gross), ...Object.keys(upkeep)])).sort();
        const outputDiv = document.getElementById('output-display');

        if (sortedResources.length === 0) {
            outputDiv.innerHTML = '<div class="ledger-empty">No active production.</div>';
            return;
        }

        let gridHtml = '<div class="ledger-grid">';
        sortedResources.forEach(res => {
            let pVal = gross[res] || 0;
            let uVal = upkeep[res] || 0;
            let netVal = pVal - uVal;
            let formattedName = res.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            let netClass = netVal > 0 ? 'positive' : (netVal < 0 ? 'negative' : 'neutral');
            let cardClass = netVal > 0 ? 'net-positive' : (netVal < 0 ? 'net-negative' : '');
            let netSign = netVal > 0 ? '+' : '';
            let resColor = RES_COLORS[res] || '#8899aa';

            gridHtml += `
                <div class="ledger-resource ${cardClass}">
                    <div class="res-bar" style="background: ${resColor};"></div>
                    <div class="res-name" style="color: ${resColor};">${formattedName}</div>
                    <div class="res-net ${netClass}">${netSign}${netVal.toFixed(1)}</div>
                    <div class="res-details">
                        ${pVal > 0 ? `<span class="res-gross">▲ ${pVal.toFixed(1)}</span>` : ''}
                        ${uVal > 0 ? `<span class="res-upkeep">▼ ${uVal.toFixed(1)}</span>` : ''}
                    </div>
                </div>
            `;
        });
        gridHtml += '</div>';
        outputDiv.innerHTML = gridHtml;
    }
