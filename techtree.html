<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPC Tech Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f14; --panel:#12151d; --card:#181c27; --card-hi:#1e2333;
  --border:#252b3b; --border-hi:#2e3650;
  --text:#c8d0e4; --dim:#5a6480; --muted:#3a4060;
  --accent:#4a7fa5; --accent-hi:#5e9bbf;
  --green:#5aac78; --red:#c05a5a; --amber:#d4a843;
  --mono:'Share Tech Mono',monospace; --body:'Inter',sans-serif;
  --r:6px; --r-sm:4px;
  /* section colors */
  --physics:#5e7fba; --society:#6aaa7e; --engineering:#c5a97a;
  --carrier:#a888cc; --swarm:#e08080; --artillery:#e2b96a;
  --capital:#7eb8d4; --sentinel:#80c0b0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}
a{color:var(--accent);}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:200;background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:10px 20px;gap:12px;}
.topbar-title{font-family:var(--mono);font-size:12px;color:var(--accent-hi);letter-spacing:.08em;text-transform:uppercase;}
.topbar-right{display:flex;gap:8px;align-items:center;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid var(--border-hi);
  border-radius:var(--r-sm);background:var(--card);color:var(--text);cursor:pointer;font-size:12px;
  font-weight:500;transition:all .15s;white-space:nowrap;font-family:var(--body);}
.btn:hover{background:var(--card-hi);border-color:var(--accent);color:#fff;}
.btn-primary{background:var(--accent);border-color:var(--accent-hi);color:#fff;}
.btn-primary:hover{background:var(--accent-hi);}

/* ── TABS ── */
.tabs{display:flex;gap:4px;padding:12px 20px 0;border-bottom:1px solid var(--border);background:var(--panel);overflow-x:auto;}
.tab{padding:7px 14px;border-radius:var(--r-sm) var(--r-sm) 0 0;border:1px solid transparent;
  border-bottom:none;cursor:pointer;font-size:12px;font-family:var(--mono);letter-spacing:.06em;
  text-transform:uppercase;color:var(--dim);background:transparent;transition:all .15s;white-space:nowrap;}
.tab:hover{color:var(--text);background:var(--card);}
.tab.active{color:#fff;background:var(--card);border-color:var(--border);}
.tab[data-section="Physics"].active{border-top:2px solid var(--physics);}
.tab[data-section="Society"].active{border-top:2px solid var(--society);}
.tab[data-section="Engineering"].active{border-top:2px solid var(--engineering);}
.tab[data-section="Carrier"].active{border-top:2px solid var(--carrier);}
.tab[data-section="Swarm"].active{border-top:2px solid var(--swarm);}
.tab[data-section="Artillery"].active{border-top:2px solid var(--artillery);}
.tab[data-section="Capital"].active{border-top:2px solid var(--capital);}
.tab[data-section="Sentinel"].active{border-top:2px solid var(--sentinel);}

/* ── CONTENT AREA ── */
.content{padding:16px 20px;overflow-x:auto;}
.section-panel{display:none;}
.section-panel.active{display:block;}

/* ── CHAIN ROWS ── */
.chain-row{display:flex;align-items:center;margin-bottom:10px;flex-wrap:nowrap;}
.chain-arrow{color:var(--dim);font-family:var(--mono);font-size:16px;padding:0 6px;flex-shrink:0;user-select:none;}

/* ── TECH NODE ── */
.tech-node{
  min-width:160px;max-width:200px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:9px 11px;cursor:pointer;transition:all .18s;flex-shrink:0;
  position:relative;
}
.tech-node:hover{border-color:var(--accent);background:var(--card-hi);}
.tech-node.researched{background:#0f1f14;border-color:var(--green);}
.tech-node.researched .node-name{color:var(--green);}
.tech-node.researched::after{content:'✓';position:absolute;top:5px;right:7px;color:var(--green);font-size:11px;font-family:var(--mono);}

.node-tier{font-family:var(--mono);font-size:10px;color:var(--dim);margin-bottom:3px;display:flex;gap:4px;align-items:center;}
.node-name{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:4px;}
.node-cost{font-family:var(--mono);font-size:10px;color:var(--dim);}
.node-effect{font-size:11px;color:var(--dim);margin-top:4px;line-height:1.3;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.node-effect.has-econ{color:var(--amber);}

.restrict-badge{font-size:9px;background:rgba(255,255,255,.06);border-radius:2px;padding:1px 3px;color:var(--dim);}

/* Section accent bar on node */
.tech-node[data-section="Physics"]{border-top:2px solid var(--physics);}
.tech-node[data-section="Society"]{border-top:2px solid var(--society);}
.tech-node[data-section="Engineering"]{border-top:2px solid var(--engineering);}
.tech-node[data-section="Carrier"]{border-top:2px solid var(--carrier);}
.tech-node[data-section="Swarm"]{border-top:2px solid var(--swarm);}
.tech-node[data-section="Artillery"]{border-top:2px solid var(--artillery);}
.tech-node[data-section="Capital"]{border-top:2px solid var(--capital);}
.tech-node[data-section="Sentinel"]{border-top:2px solid var(--sentinel);}

/* ── STATS BAR ── */
.stats-bar{display:flex;gap:16px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;color:var(--dim);
  padding:8px 20px;background:var(--panel);border-bottom:1px solid var(--border);}
.stat-item{display:flex;gap:5px;align-items:center;}
.stat-val{color:var(--text);font-weight:600;}
.stat-val.positive{color:var(--green);}
.stat-val.negative{color:var(--red);}

/* ── TOOLTIP ── */
.tooltip{position:fixed;z-index:999;pointer-events:none;opacity:0;transition:opacity .12s;
  background:var(--panel);border:1px solid var(--accent);border-radius:var(--r);
  padding:12px 14px;max-width:280px;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.tooltip.visible{opacity:1;}
.tt-name{font-size:13px;font-weight:600;margin-bottom:4px;}
.tt-meta{font-family:var(--mono);font-size:10px;color:var(--dim);margin-bottom:8px;}
.tt-effect{font-size:12px;line-height:1.5;color:var(--text);}
.tt-econ{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.tt-econ-row{font-family:var(--mono);font-size:11px;color:var(--amber);line-height:1.6;}

/* ── SEARCH ── */
.search-wrap{padding:10px 20px;background:var(--panel);border-bottom:1px solid var(--border);}
.search-input{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:6px 12px;color:var(--text);font-size:13px;width:280px;outline:none;font-family:var(--body);}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}

/* ── ECONOMY EFFECTS PANEL ── */
.econ-panel{background:var(--panel);border:1px solid var(--accent);border-radius:var(--r);
  padding:14px 18px;margin:12px 0;}
.econ-panel h3{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;
  color:var(--accent-hi);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.econ-panel h3::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 6px var(--accent);}
.econ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
.econ-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:8px 10px;}
.econ-card-res{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);}
.econ-card-val{font-family:var(--mono);font-size:18px;color:var(--green);}
.econ-card-val.negative{color:var(--red);}
.econ-card-note{font-size:10px;color:var(--dim);margin-top:2px;}

/* hide no-match */
.chain-row.hidden{display:none;}
.tech-node.dim-search{opacity:.25;}
</style>
</head>

// ── EFFECT RENDERING ─────────────────────────────────────────────────────────
const RES_LABELS = {
  tech:'Tech',food:'Food',minerals:'Minerals',mineral:'Minerals',
  alloys:'Alloys',alloy:'Alloys',money:'Money',unity:'Unity',
  influence:'Influence',abstract:'Abstract Res',basic:'Basic Res',trade:'Trade'
};

function effectSummary(effects) {
  const econ = effects.filter(e => e.kind !== 'display');
  const disp = effects.filter(e => e.kind === 'display');
  const lines = [];
  econ.forEach(e => {
    const sign = e.val >= 0 ? '+' : '';
    if (e.kind === 'flat_turn') lines.push(`${sign}${e.val} ${RES_LABELS[e.res]||e.res}/turn`);
    else if (e.kind === 'pct_turn') {
      if (e.res === 'basic') lines.push(`${sign}${e.val}% All Basic/turn`);
      else lines.push(`${sign}${e.val}% ${RES_LABELS[e.res]||e.res}/turn`);
    }
    else if (e.kind === 'flat_planet') {
      if (e.res === 'basic') lines.push(`${sign}${e.val} Basic/planet`);
      else lines.push(`${sign}${e.val} ${RES_LABELS[e.res]||e.res}/planet`);
    }
    else if (e.kind === 'flat_typed_planet') lines.push(`${sign}${e.val} ${RES_LABELS[e.res]||e.res}/${e.planet_type} planet`);
    else if (e.kind === 'flat_upkeep_planet') lines.push(`${sign}${e.val} ${RES_LABELS[e.res]||e.res} upkeep/planet`);
    else if (e.kind === 'habitability') lines.push(`${sign}${e.val}% Habitability`);
    else if (e.kind === 'planet_cap') lines.push(`${sign}${e.val} Planet Cap`);
  });
  if (lines.length === 0 && disp.length > 0) return disp[0].text.slice(0,60);
  return lines.join(' · ');
}

function hasEcon(effects) {
  return effects.some(e => e.kind !== 'display');
}

// ── COMPUTE ECONOMY TOTALS ────────────────────────────────────────────────────
function computeEconTotals() {
  // Returns flat empire-wide bonuses from researched techs
  // These become "turn" scope global modifiers in the economy calc
  const totals = {
    flat_turn: {}, pct_turn: {}, flat_planet: {}, flat_typed_planet: [],
    flat_upkeep_planet: [], habitability: 0, planet_cap: 2 // base 2
  };

  Object.entries(researched).forEach(([id, isRes]) => {
    if (!isRes) return;
    const node = allNodes[id];
    if (!node) return;
    node.effects.forEach(e => {
      if (e.kind === 'flat_turn') {
        totals.flat_turn[e.res] = (totals.flat_turn[e.res]||0) + e.val;
      } else if (e.kind === 'pct_turn') {
        totals.pct_turn[e.res] = (totals.pct_turn[e.res]||0) + e.val;
      } else if (e.kind === 'flat_planet') {
        totals.flat_planet[e.res] = (totals.flat_planet[e.res]||0) + e.val;
      } else if (e.kind === 'flat_typed_planet') {
        // accumulate per type+res
        const key = `${e.planet_type}|${e.res}`;
        if (!totals.flat_typed_planet[key]) totals.flat_typed_planet[key] = {planet_type:e.planet_type,res:e.res,val:0};
        totals.flat_typed_planet[key].val += e.val;
      } else if (e.kind === 'flat_upkeep_planet') {
        const key = `upkeep|${e.res}`;
        if (!totals.flat_typed_planet[key]) totals.flat_typed_planet[key] = {planet_type:'all',res:e.res,isUpkeep:true,val:0};
        totals.flat_typed_planet[key].val += e.val;
      } else if (e.kind === 'habitability') {
        totals.habitability += e.val;
      } else if (e.kind === 'planet_cap') {
        totals.planet_cap += e.val;
      }
    });
  });
  return totals;
}

// ── STATS BAR UPDATE ─────────────────────────────────────────────────────────
function updateStats() {
  const totals = computeEconTotals();
  document.getElementById('s-planet-cap').textContent = totals.planet_cap;
  document.getElementById('s-hab').textContent = totals.habitability > 0 ? `+${totals.habitability}%` : `${totals.habitability}%`;
  const count = Object.values(researched).filter(Boolean).length;
  document.getElementById('s-count').textContent = count;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
const SECTIONS = ['Physics','Society','Engineering','Carrier','Swarm','Artillery','Capital','Sentinel'];
const SEC_ICONS = {
  Physics:'⚛', Society:'🌿', Engineering:'⚙', Carrier:'✈',
  Swarm:'🚀', Artillery:'🎯', Capital:'🛡', Sentinel:'🔰'
};

function renderAll() {
  const tabBar = document.getElementById('tab-bar');
  const contentRoot = document.getElementById('content-root');
  tabBar.innerHTML = '';
  contentRoot.innerHTML = '';

  SECTIONS.forEach((sect, i) => {
    if (!TECH_DATA[sect]) return;

    // Tab
    const tab = document.createElement('button');
    tab.className = 'tab' + (i === 0 ? ' active' : '');
    tab.dataset.section = sect;
    tab.textContent = `${SEC_ICONS[sect]} ${sect}`;
    tab.onclick = () => switchTab(sect);
    tabBar.appendChild(tab);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'section-panel' + (i === 0 ? ' active' : '');
    panel.id = `panel-${sect}`;
    panel.dataset.section = sect;

    // Chains
    const chains = TECH_DATA[sect];
    chains.forEach(chain => {
      const row = document.createElement('div');
      row.className = 'chain-row';

      chain.forEach((node, ni) => {
        if (ni > 0) {
          const arrow = document.createElement('span');
          arrow.className = 'chain-arrow';
          arrow.textContent = '→';
          row.appendChild(arrow);
        }
        row.appendChild(buildNode(node, sect));
      });

      panel.appendChild(row);
    });

    contentRoot.appendChild(panel);
  });
}

function buildNode(node, sect) {
  const div = document.createElement('div');
  div.className = 'tech-node';
  div.dataset.section = sect;
  div.dataset.id = node.id;
  div.dataset.name = node.name.toLowerCase();

  if (researched[node.id]) div.classList.add('researched');

  const tierEl = document.createElement('div');
  tierEl.className = 'node-tier';
  tierEl.innerHTML = `<span>${node.tier||'?'}</span>`;
  if (node.restrictions && node.restrictions.length) {
    const restIcons = {organic:'🧬',machine:'🤖',psionic:'🔮',hive:'🐝',gestalt:'🕸'};
    node.restrictions.forEach(r => {
      const b = document.createElement('span');
      b.className = 'restrict-badge';
      b.textContent = restIcons[r]||r;
      tierEl.appendChild(b);
    });
  }

  const nameEl = document.createElement('div');
  nameEl.className = 'node-name';
  nameEl.textContent = node.name;

  const costEl = document.createElement('div');
  costEl.className = 'node-cost';
  costEl.textContent = node.cost !== '?' ? `${node.cost} ⚛` : '';

  const effectEl = document.createElement('div');
  const summary = effectSummary(node.effects);
  effectEl.className = 'node-effect' + (hasEcon(node.effects) ? ' has-econ' : '');
  effectEl.textContent = summary;

  div.appendChild(tierEl);
  div.appendChild(nameEl);
  div.appendChild(costEl);
  if (summary) div.appendChild(effectEl);

  // Click to toggle
  div.addEventListener('click', () => toggleTech(node.id, div));
  // Hover tooltip
  div.addEventListener('mouseenter', (e) => showTooltip(e, node));
  div.addEventListener('mouseleave', hideTooltip);
  div.addEventListener('mousemove', moveTooltip);

  return div;
}

function switchTab(sect) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.section === sect));
  document.querySelectorAll('.section-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${sect}`));
}

function toggleTech(id, el) {
  researched[id] = !researched[id];
  el.classList.toggle('researched', researched[id]);
  updateStats();
  // Live sync to economy calculator via localStorage
  try { localStorage.setItem('spc_techtree', JSON.stringify(researched)); } catch(e) {}
}

// ── TOOLTIP ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
let ttVisible = false;

function showTooltip(e, node) {
  const econ = node.effects.filter(ef => ef.kind !== 'display');
  const disp = node.effects.filter(ef => ef.kind === 'display');

  let html = `<div class="tt-name">${node.name}</div>`;
  html += `<div class="tt-meta">${node.tier} · ${node.type} · ${node.cost !== '?' ? node.cost + ' ⚛' : '?'}</div>`;
  html += `<div class="tt-effect">${node.effect_raw}</div>`;

  if (econ.length) {
    html += `<div class="tt-econ">`;
    econ.forEach(e => {
      const sign = e.val >= 0 ? '+' : '';
      let label = '';
      if (e.kind==='flat_turn') label = `${sign}${e.val} ${RES_LABELS[e.res]||e.res} per turn`;
      else if (e.kind==='pct_turn') label = `${sign}${e.val}% ${e.res==='basic'?'All Basic':RES_LABELS[e.res]||e.res} per turn`;
      else if (e.kind==='flat_planet') label = `${sign}${e.val} ${e.res==='basic'?'Basic Res':RES_LABELS[e.res]||e.res} per planet`;
      else if (e.kind==='flat_typed_planet') label = `${sign}${e.val} ${RES_LABELS[e.res]||e.res} per ${e.planet_type} planet`;
      else if (e.kind==='flat_upkeep_planet') label = `${sign}${e.val} ${RES_LABELS[e.res]||e.res} upkeep per planet`;
      else if (e.kind==='habitability') label = `${sign}${e.val}% Habitability`;
      else if (e.kind==='planet_cap') label = `${sign}${e.val} Planet Cap`;
      if (label) html += `<div class="tt-econ-row">⚡ ${label}</div>`;
    });
    html += `</div>`;
  }

  tooltip.innerHTML = html;
  tooltip.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  const tw = 280, th = 200;
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + tw > window.innerWidth) x = e.clientX - tw - 14;
  if (y + th > window.innerHeight) y = e.clientY - th - 14;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function filterSearch(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('.chain-row').forEach(row => {
    const nodes = row.querySelectorAll('.tech-node');
    if (!q) {
      row.classList.remove('hidden');
      nodes.forEach(n => n.classList.remove('dim-search'));
      return;
    }
    let anyMatch = false;
    nodes.forEach(n => {
      const name = n.dataset.name || '';
      const match = name.includes(q);
      n.classList.toggle('dim-search', !match);
      if (match) anyMatch = true;
    });
    row.classList.toggle('hidden', !anyMatch);
  });
}

function saveResearched() {
  // Merge with any existing economy save data in localStorage
  let combined = {techtree: researched};
  try {
    const econData = localStorage.getItem('spc_economy');
    if (econData) Object.assign(combined, JSON.parse(econData));
  } catch(e) {}
  combined.techtree = researched; // ensure tech is current
  const data = JSON.stringify(combined, null, 2);
  const a = document.createElement('a');
  a.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(data);
  a.download = 'empire_save.json';
  document.body.appendChild(a); a.click(); a.remove();
}

function loadResearched(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const loaded = JSON.parse(e.target.result);
      if (loaded.techtree) {
        researched = loaded.techtree;
        try { localStorage.setItem('spc_techtree', JSON.stringify(researched)); } catch(ex) {}
        document.querySelectorAll('.tech-node').forEach(el => {
          const id = el.dataset.id;
          el.classList.toggle('researched', !!researched[id]);
        });
        updateStats();
      } else {
        alert('No tech tree data found in this save file.');
      }
    } catch(err) {
      alert('Error loading save file.');
    }
  };
  reader.readAsText(file);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
// Load from localStorage on startup (live sync with economy calculator)
try {
  const stored = localStorage.getItem('spc_techtree');
  if (stored) researched = JSON.parse(stored);
} catch(e) {}

renderAll();
updateStats();
</script>
